<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="단어 사전" />
<title>영어 단어 사전</title>

<style>
  :root {
    --kid-primary: #1976D2;
    --kid-secondary: #42A5F5;
    --kid-accent: #00B0FF;
    --kid-light: #E3F2FD;
    --kid-mid: #BBDEFB;

    --adult-primary: #7B5EA7;
    --adult-secondary: #9C6FCC;
    --adult-light: #F3E5F5;
    --adult-mid: #E1BEE7;

    --danger: #EF5350;
    --success: #42A5F5;
    --warning: #FF9800;
    --text: #263238;
    --muted: #90A4AE;
    --card: #FFFFFF;
    --shadow: 0 5px 22px rgba(0,0,0,0.08);
    --radius: 22px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
    transition: background 0.35s;
  }

  body.kid {
    background: linear-gradient(150deg, #E3F2FD 0%, #E8F5FF 48%, #EDE7F6 100%);
  }

  body.adult {
    background: linear-gradient(150deg, #F3E5F5 0%, #EDE7F6 52%, #E8EAF6 100%);
  }

  button, input, textarea {
    font-family: inherit;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 14px 14px 12px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }

  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  body.kid .logo {
    color: var(--kid-primary);
  }

  body.adult .logo {
    color: var(--adult-primary);
  }

  .mode-btns {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .mode-btn,
  .test-btn,
  .small-top-btn {
    border: none;
    cursor: pointer;
    padding: 8px 11px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-btn {
    background: #ECEFF1;
    color: #78909C;
  }

  .mode-btn.active {
    color: white;
    box-shadow: 0 4px 13px rgba(0,0,0,0.16);
    transform: translateY(-1px);
  }

  .kid-btn.active {
    background: linear-gradient(135deg, #1565C0, #2979FF);
  }

  .adult-btn.active {
    background: linear-gradient(135deg, #6A1B9A, #9C6FCC);
  }

  .test-btn {
    background: linear-gradient(135deg, #FF9800, #F44336);
    color: white;
    box-shadow: 0 3px 10px rgba(244,67,54,0.24);
  }

  .small-top-btn {
    background: #FFFFFF;
    color: #546E7A;
    border: 1px solid #E0E0E0;
  }

  .mode-btn:active,
  .test-btn:active,
  .small-top-btn:active,
  .search-btn:active,
  .save-btn:active,
  .download-btn:active,
  .delete-btn:active,
  .edit-btn:active {
    transform: scale(0.96);
  }

  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 14px 50px 14px 16px;
    border: 2px solid transparent;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 650;
    outline: none;
    background: white;
    color: #263238;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    transition: all 0.2s;
  }

  body.kid .search-input:focus {
    border-color: var(--kid-primary);
    box-shadow: 0 2px 20px rgba(41,121,255,0.2);
  }

  body.adult .search-input:focus {
    border-color: var(--adult-primary);
    box-shadow: 0 2px 20px rgba(123,94,167,0.2);
  }

  .search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 13px;
    cursor: pointer;
    color: white;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body.kid .search-btn {
    background: linear-gradient(135deg, #1565C0, #2979FF);
  }

  body.adult .search-btn {
    background: linear-gradient(135deg, #6A1B9A, #9C6FCC);
  }

  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 14px;
  }

  .welcome {
    text-align: center;
    padding: 36px 16px;
    animation: fadeIn 0.35s;
  }

  .welcome-emoji {
    font-size: 62px;
    margin-bottom: 14px;
  }

  .welcome h2 {
    font-size: 23px;
    font-weight: 950;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  body.kid .welcome h2 {
    color: var(--kid-primary);
  }

  body.adult .welcome h2 {
    color: var(--adult-primary);
  }

  .welcome p {
    color: #78909C;
    font-size: 15px;
    line-height: 1.7;
    font-weight: 550;
  }

  .result-card,
  .wordbook-card,
  .error-card {
    background: white;
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    animation: slideUp 0.35s ease;
    border: 2px solid transparent;
  }

  body.kid .result-card,
  body.kid .wordbook-card {
    border-color: rgba(41,121,255,0.14);
  }

  body.adult .result-card,
  body.adult .wordbook-card {
    border-color: rgba(123,94,167,0.14);
  }

  .word-title {
    font-weight: 950;
    letter-spacing: -0.8px;
    margin-bottom: 4px;
    word-break: break-word;
  }

  body.kid .word-title {
    font-size: 44px;
    color: var(--kid-primary);
  }

  body.adult .word-title {
    font-size: 32px;
    color: var(--adult-primary);
  }

  .phonetic {
    font-size: 16px;
    color: #90A4AE;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .word-pos {
    font-weight: 950;
    text-transform: lowercase;
    margin-bottom: 18px;
  }

  body.kid .word-pos {
    font-size: 24px;
    color: var(--kid-accent);
    letter-spacing: 0.5px;
  }

  body.adult .word-pos {
    font-size: 14px;
    color: #9E9E9E;
    letter-spacing: 1.1px;
    text-transform: uppercase;
  }

  .def-block,
  .ex-block,
  .syn-block {
    border-radius: 16px;
    padding: 15px 16px;
    margin-bottom: 12px;
  }

  body.kid .def-block {
    background: linear-gradient(135deg, #E3F2FD, #EDE7F6);
  }

  body.adult .def-block {
    background: linear-gradient(135deg, #F3E5F5, #EDE7F6);
  }

  body.kid .ex-block {
    background: linear-gradient(135deg, #DCEEFB, #D1E9FF);
  }

  body.adult .ex-block {
    background: linear-gradient(135deg, #EDE7F6, #E8EAF6);
  }

  .syn-block {
    background: #FAFAFA;
    border: 1px solid #EEEEEE;
  }

  .def-label,
  .ex-label,
  .syn-label {
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 2px;
    margin-bottom: 7px;
  }

  body.kid .def-label,
  body.kid .ex-label {
    color: var(--kid-primary);
  }

  body.adult .def-label,
  body.adult .ex-label {
    color: var(--adult-primary);
  }

  .syn-label {
    color: #78909C;
  }

  .def-text,
  .ex-text {
    color: #263238;
    line-height: 1.65;
    font-weight: 700;
  }

  body.kid .def-text {
    font-size: 22px;
  }

  body.kid .ex-text {
    font-size: 23px;
    font-style: italic;
  }

  body.adult .def-text,
  body.adult .ex-text {
    font-size: 16px;
  }

  body.adult .ex-text {
    font-style: italic;
  }

  .syn-text {
    color: #455A64;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 650;
  }

  .button-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .save-btn,
  .download-btn,
  .secondary-btn {
    border: none;
    cursor: pointer;
    border-radius: 14px;
    padding: 12px 15px;
    font-size: 15px;
    font-weight: 900;
    transition: all 0.2s;
  }

  .save-btn {
    color: white;
    background: linear-gradient(135deg, #1565C0, #2979FF);
    box-shadow: 0 4px 12px rgba(41,121,255,0.25);
  }

  .download-btn {
    color: white;
    background: linear-gradient(135deg, #2E7D32, #66BB6A);
    box-shadow: 0 4px 12px rgba(46,125,50,0.22);
  }

  .secondary-btn {
    background: #ECEFF1;
    color: #455A64;
  }

  .loading-wrap {
    text-align: center;
    padding: 52px 20px;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 4px solid #ECEFF1;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }

  body.kid .spinner {
    border-top-color: var(--kid-primary);
  }

  body.adult .spinner {
    border-top-color: var(--adult-primary);
  }

  .loading-text {
    color: #78909C;
    font-size: 15px;
    font-weight: 800;
  }

  .error-card {
    background: #FFF5F5;
    border-color: #FFCDD2;
    text-align: center;
  }

  .error-emoji {
    font-size: 42px;
    margin-bottom: 10px;
  }

  .error-text {
    color: #E57373;
    font-size: 15px;
    font-weight: 750;
    line-height: 1.6;
  }

  .wordbook-card {
    margin-top: 14px;
  }

  .wordbook-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
  }

  .wordbook-title {
    font-size: 19px;
    font-weight: 950;
    letter-spacing: -0.3px;
  }

  body.kid .wordbook-title {
    color: var(--kid-primary);
  }

  body.adult .wordbook-title {
    color: var(--adult-primary);
  }

  .wordbook-count {
    color: #90A4AE;
    font-size: 13px;
    font-weight: 800;
  }

  .saved-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .saved-item {
    border: 1px solid #ECEFF1;
    background: #FAFAFA;
    border-radius: 16px;
    padding: 13px;
  }

  .saved-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }

  .saved-word {
    font-size: 20px;
    font-weight: 950;
    color: #263238;
    word-break: break-word;
  }

  .saved-pos {
    display: inline-block;
    margin-left: 5px;
    font-size: 12px;
    color: #90A4AE;
    font-weight: 900;
    text-transform: uppercase;
  }

  .saved-date {
    color: #90A4AE;
    font-size: 12px;
    font-weight: 750;
    margin-top: 3px;
  }

  .saved-def {
    margin-top: 8px;
    color: #455A64;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 600;
  }

  .saved-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .delete-btn,
  .edit-btn,
  .open-btn {
    border: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 8px 10px;
    font-size: 13px;
    font-weight: 850;
  }

  .delete-btn {
    background: #FFEBEE;
    color: #D32F2F;
  }

  .edit-btn {
    background: #E3F2FD;
    color: #1565C0;
  }

  .open-btn {
    background: #F3E5F5;
    color: #6A1B9A;
  }

  .empty-wordbook {
    text-align: center;
    color: #90A4AE;
    padding: 22px 10px;
    line-height: 1.6;
    font-size: 14px;
    font-weight: 700;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: white;
    border-radius: 24px;
    width: 100%;
    max-width: 430px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.22);
    animation: popUp 0.28s ease;
  }

  .modal-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 19px;
    font-weight: 950;
    color: #263238;
  }

  .modal-close {
    border: none;
    background: #ECEFF1;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    color: #455A64;
  }

  .modal-body {
    padding: 16px 20px 22px;
  }

  .word-input-area {
    width: 100%;
    min-height: 95px;
    padding: 12px 14px;
    border: 2px solid #ECEFF1;
    border-radius: 15px;
    font-size: 15px;
    resize: vertical;
    outline: none;
    color: #263238;
  }

  .word-input-area:focus {
    border-color: #FF9800;
  }

  .word-input-hint {
    color: #90A4AE;
    font-size: 12px;
    margin-top: 7px;
    margin-bottom: 14px;
    line-height: 1.5;
    font-weight: 650;
  }

  .start-test-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: 950;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #FF9800, #F44336);
    box-shadow: 0 4px 14px rgba(244,67,54,0.28);
  }

  .quiz-progress {
    text-align: right;
    color: #90A4AE;
    font-size: 13px;
    font-weight: 850;
    margin-bottom: 5px;
  }

  .progress-bar-wrap {
    height: 7px;
    background: #ECEFF1;
    border-radius: 5px;
    margin-bottom: 15px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(90deg, #2979FF, #00B0FF);
    transition: width 0.3s ease;
  }

  .quiz-question {
    border-radius: 17px;
    padding: 18px 16px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #E3F2FD, #EDE7F6);
  }

  .quiz-q-label {
    color: #78909C;
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 1.4px;
    margin-bottom: 9px;
  }

  .quiz-q-def {
    color: #263238;
    font-size: 20px;
    line-height: 1.6;
    font-weight: 850;
  }

  .quiz-choices {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .quiz-choice {
    border: 2px solid #ECEFF1;
    border-radius: 15px;
    padding: 14px 15px;
    background: white;
    cursor: pointer;
    text-align: left;
    color: #263238;
    font-size: 17px;
    font-weight: 900;
    transition: all 0.2s;
  }

  .quiz-choice.correct {
    border-color: #42A5F5;
    background: #E3F2FD;
    color: #1565C0;
  }

  .quiz-choice.wrong {
    border-color: #EF9A9A;
    background: #FFF5F5;
    color: #C62828;
  }

  .quiz-choice.disabled {
    pointer-events: none;
  }

  .quiz-result {
    text-align: center;
    padding: 18px 10px;
  }

  .quiz-score-emoji {
    font-size: 64px;
    margin-bottom: 10px;
  }

  .quiz-score {
    font-size: 30px;
    font-weight: 950;
    color: #263238;
    margin-bottom: 6px;
  }

  .quiz-score-msg {
    font-size: 15px;
    color: #78909C;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .edit-field-label {
    display: block;
    font-size: 12px;
    color: #78909C;
    font-weight: 900;
    margin: 12px 0 6px;
  }

  .edit-input,
  .edit-textarea {
    width: 100%;
    border: 2px solid #ECEFF1;
    border-radius: 14px;
    padding: 11px 12px;
    font-size: 14px;
    outline: none;
    color: #263238;
  }

  .edit-textarea {
    min-height: 82px;
    resize: vertical;
    line-height: 1.5;
  }

  .edit-input:focus,
  .edit-textarea:focus {
    border-color: #2979FF;
  }

  #confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes popUp {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 420px) {
    .header-top {
      align-items: flex-start;
    }

    .logo {
      font-size: 18px;
      padding-top: 4px;
    }

    .mode-btn,
    .test-btn,
    .small-top-btn {
      font-size: 12px;
      padding: 7px 9px;
    }

    body.kid .word-title {
      font-size: 40px;
    }

    body.kid .def-text,
    body.kid .ex-text {
      font-size: 21px;
    }
  }
</style>
</head>

<body class="kid">

<canvas id="confetti-canvas"></canvas>

<div class="header">
  <div class="header-top">
    <div class="logo" id="logo">📖 단어 사전</div>

    <div class="mode-btns">
      <button class="mode-btn kid-btn active" id="kidBtn" onclick="setMode('kid')">👦 어린이</button>
      <button class="mode-btn adult-btn" id="adultBtn" onclick="setMode('adult')">👩 어른</button>
      <button class="test-btn" onclick="openTestModal()">🎯 테스트</button>
    </div>
  </div>

  <div class="search-wrap">
    <input
      class="search-input"
      id="searchInput"
      type="text"
      placeholder="영어 단어를 입력하세요..."
      autocomplete="off"
      autocapitalize="none"
    />
    <button class="search-btn" onclick="doSearch()">🔍</button>
  </div>
</div>

<div class="main">
  <div id="content"></div>

  <div class="wordbook-card" id="wordbookCard">
    <div class="wordbook-header">
      <div>
        <div class="wordbook-title">📘 내 단어장</div>
        <div class="wordbook-count" id="wordbookCount">0 words</div>
      </div>
      <button class="download-btn" onclick="downloadCSV()">⬇️ CSV</button>
    </div>

    <div id="savedWords" class="saved-list"></div>
  </div>
</div>

<div class="modal-overlay" id="testModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">🎯 단어 테스트</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let currentMode = "kid";
let currentWordData = null;
let quizData = [];
let currentQ = 0;
let score = 0;

const STORAGE_KEY = "myEnglishWordbook_v1";

/* -----------------------------
   INIT
----------------------------- */
document.addEventListener("DOMContentLoaded", () => {
  showWelcome();
  renderSavedWords();

  document.getElementById("searchInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doSearch();
  });

  document.getElementById("testModal").addEventListener("click", (e) => {
    if (e.target === document.getElementById("testModal")) closeModal();
  });
});

/* -----------------------------
   MODE
----------------------------- */
function setMode(mode) {
  currentMode = mode;
  document.body.className = mode;

  document.getElementById("kidBtn").className =
    "mode-btn kid-btn" + (mode === "kid" ? " active" : "");

  document.getElementById("adultBtn").className =
    "mode-btn adult-btn" + (mode === "adult" ? " active" : "");

  document.getElementById("logo").textContent =
    mode === "kid" ? "📖 단어 사전" : "📘 단어 사전";

  const value = document.getElementById("searchInput").value.trim();
  if (value) {
    doSearch();
  } else {
    showWelcome();
  }
}

function showWelcome() {
  const isKid = currentMode === "kid";

/* -----------------------------
   SEARCH
----------------------------- */
async function doSearch() {
  const word = document.getElementById("searchInput").value.trim();

  if (!word) return;

  showLoading();

  try {
    const result = await fetchWordData(word);
    currentWordData = result;
    showResult(result);
  } catch (error) {
    currentWordData = null;
    showError(word);
  }
}

function showLoading() {
  document.getElementById("content").innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">단어 찾는 중... ✨</div>
    </div>
  `;
}

function showError(word) {
  document.getElementById("content").innerHTML = `
    <div class="error-card">
      <div class="error-emoji">🔍</div>
      <div class="error-text">
        "${escapeHTML(word)}" 단어를 찾을 수 없어요.<br>
        철자를 다시 확인해 주세요.
      </div>
    </div>
  `;
}

async function fetchWordData(word) {
  const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`;
  const res = await fetch(url);

  if (!res.ok) {
    throw new Error("Word not found");
  }

  const data = await res.json();
  return normalizeDictionaryData(data[0]);
}

function normalizeDictionaryData(entry) {
  const meanings = entry.meanings || [];

  let selectedMeaning = null;
  let selectedDefinition = null;

  if (currentMode === "kid") {
    const kidFriendly = findKidFriendlyDefinition(meanings);
    selectedMeaning = kidFriendly.meaning;
    selectedDefinition = kidFriendly.definition;
  } else {
    for (const meaning of meanings) {
      if (meaning.definitions && meaning.definitions.length > 0) {
        selectedMeaning = meaning;
        selectedDefinition = meaning.definitions[0];
        break;
      }
    }
  }

  if (!selectedMeaning || !selectedDefinition) {
    throw new Error("No usable definition");
  }

  const allDefinitions = [];
  meanings.forEach((meaning) => {
    (meaning.definitions || []).forEach((def) => {
      if (def.definition) {
        allDefinitions.push({
          pos: meaning.partOfSpeech || "",
          definition: def.definition,
          example: def.example || "",
          synonyms: [
            ...(meaning.synonyms || []),
            ...(def.synonyms || [])
          ],
          antonyms: [
            ...(meaning.antonyms || []),
            ...(def.antonyms || [])
          ]
        });
      }
    });
  });

  const adultDefinitions = allDefinitions.slice(0, 5);

  const synonyms = uniqueWords([
    ...(selectedMeaning.synonyms || []),
    ...(selectedDefinition.synonyms || [])
  ]).slice(0, 8);

  const antonyms = uniqueWords([
    ...(selectedMeaning.antonyms || []),
    ...(selectedDefinition.antonyms || [])
  ]).slice(0, 8);

  return {
    word: entry.word || "",
    phonetic: getPhonetic(entry),
    pos: selectedMeaning.partOfSpeech || "",
    definition: selectedDefinition.definition || "",
    example: selectedDefinition.example || "",
    synonyms,
    antonyms,
    searchedDate: getToday(),
    adultDefinitions
  };
}

function findKidFriendlyDefinition(meanings) {
  let candidates = [];

  meanings.forEach((meaning) => {
    (meaning.definitions || []).forEach((def) => {
      if (!def.definition) return;

      candidates.push({
        meaning,
        definition: def,
        score: getKidScore(def.definition, def.example || "")
      });
    });
  });

  if (candidates.length === 0) {
    return { meaning: null, definition: null };
  }

  candidates.sort((a, b) => a.score - b.score);
  return candidates[0];
}

function getKidScore(definition, example) {
  const defWords = definition.split(/\s+/).length;
  const exWords = example ? example.split(/\s+/).length : 99;
  const punctuationPenalty = /[;:()]/.test(definition) ? 10 : 0;
  const longDefinitionPenalty = defWords > 22 ? 15 : 0;
  const noExamplePenalty = example ? 0 : 5;

  return defWords + exWords * 0.2 + punctuationPenalty + longDefinitionPenalty + noExamplePenalty;
}

function getPhonetic(entry) {
  if (entry.phonetic) return entry.phonetic;

  const phonetics = entry.phonetics || [];
  const found = phonetics.find((p) => p.text);
  return found ? found.text : "";
}

function showResult(d) {
  const exampleHTML = d.example
    ? `
      <div class="ex-block">
        <div class="ex-label">EX.</div>
        <div class="ex-text">${escapeHTML(d.example)}</div>
      </div>
    `
    : "";

  const synonymsHTML = d.synonyms && d.synonyms.length > 0
    ? `
      <div class="syn-block">
        <div class="syn-label">SYN.</div>
        <div class="syn-text">${d.synonyms.map(escapeHTML).join(", ")}</div>
      </div>
    `
    : "";

  const antonymsHTML = d.antonyms && d.antonyms.length > 0
    ? `
      <div class="syn-block">
        <div class="syn-label">ANT.</div>
        <div class="syn-text">${d.antonyms.map(escapeHTML).join(", ")}</div>
      </div>
    `
    : "";

  const adultExtraHTML = currentMode === "adult"
    ? renderAdultDefinitions(d.adultDefinitions)
    : "";

  document.getElementById("content").innerHTML = `
    <div class="result-card">
      <div class="word-title">${escapeHTML(d.word)}</div>
      ${d.phonetic ? `<div class="phonetic">${escapeHTML(d.phonetic)}</div>` : ""}
      <div class="word-pos">${escapeHTML(d.pos)}</div>

      <div class="def-block">
        <div class="def-label">DEF.</div>
        <div class="def-text">${escapeHTML(d.definition)}</div>
      </div>

      ${exampleHTML}
      ${adultExtraHTML}
      ${synonymsHTML}
      ${antonymsHTML}

      <div class="button-row">
        <button class="save-btn" onclick="saveCurrentWord()">💾 단어장에 저장</button>
        <button class="secondary-btn" onclick="scrollToWordbook()">📘 단어장 보기</button>
      </div>
    </div>
  `;
}

function renderAdultDefinitions(definitions) {
  if (!definitions || definitions.length <= 1) return "";

  const extra = definitions.slice(1, 5);

  if (extra.length === 0) return "";

  return `
    <div class="syn-block">
      <div class="syn-label">MORE DEF.</div>
      <div class="syn-text">
        ${extra.map((item, index) => `
          <div style="margin-bottom:8px;">
            <strong>${index + 2}. ${escapeHTML(item.pos)}</strong><br>
            ${escapeHTML(item.definition)}
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

/* -----------------------------
   WORDBOOK
----------------------------- */
function saveCurrentWord() {
  if (!currentWordData) return;

  const saved = getSavedWords();
  const key = currentWordData.word.toLowerCase();

  const exists = saved.some((item) => item.word.toLowerCase() === key);

  if (exists) {
    alert("이미 저장된 단어예요!");
    return;
  }

  const item = {
    word: currentWordData.word,
    pos: currentWordData.pos,
    definition: currentWordData.definition,
    example: currentWordData.example || "",
    synonyms: currentWordData.synonyms || [],
    antonyms: currentWordData.antonyms || [],
    searchedDate: currentWordData.searchedDate || getToday()
  };

  saved.push(item);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));

  renderSavedWords();
  alert("단어장에 저장했어요!");
}

function getSavedWords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  } catch {
    return [];
  }
}

function renderSavedWords() {
  const saved = getSavedWords();
  const box = document.getElementById("savedWords");
  const count = document.getElementById("wordbookCount");

  count.textContent = `${saved.length} word${saved.length === 1 ? "" : "s"}`;

  if (saved.length === 0) {
    box.innerHTML = `
      <div class="empty-wordbook">
        아직 저장한 단어가 없어요.<br>
        단어를 검색한 뒤 <strong>단어장에 저장</strong>을 눌러보세요.
      </div>
    `;
    return;
  }

  const sorted = [...saved].sort((a, b) => {
    return a.word.localeCompare(b.word);
  });

  box.innerHTML = sorted.map((item) => `
    <div class="saved-item">
      <div class="saved-top">
        <div>
          <div>
            <span class="saved-word">${escapeHTML(item.word)}</span>
            ${item.pos ? `<span class="saved-pos">${escapeHTML(item.pos)}</span>` : ""}
          </div>
          <div class="saved-date">${escapeHTML(item.searchedDate || "")}</div>
        </div>
      </div>

      <div class="saved-def">${escapeHTML(item.definition || "")}</div>

      <div class="saved-actions">
        <button class="open-btn" onclick="searchSavedWord('${escapeJS(item.word)}')">다시 보기</button>
        <button class="edit-btn" onclick="openEditModal('${escapeJS(item.word)}')">수정</button>
        <button class="delete-btn" onclick="deleteSavedWord('${escapeJS(item.word)}')">삭제</button>
      </div>
    </div>
  `).join("");
}

function searchSavedWord(word) {
  document.getElementById("searchInput").value = word;
  window.scrollTo({ top: 0, behavior: "smooth" });
  doSearch();
}

function deleteSavedWord(word) {
  const ok = confirm(`"${word}" 단어를 단어장에서 삭제할까요?`);

  if (!ok) return;

  const saved = getSavedWords();
  const filtered = saved.filter((item) => item.word !== word);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
  renderSavedWords();
}

function openEditModal(word) {
  const saved = getSavedWords();
  const item = saved.find((x) => x.word === word);

  if (!item) return;

  document.getElementById("modalTitle").textContent = "✏️ 단어 수정";
  document.getElementById("testModal").classList.add("show");

  document.getElementById("modalBody").innerHTML = `
    <label class="edit-field-label">WORD</label>
    <input class="edit-input" id="editWord" value="${escapeHTML(item.word)}" />

    <label class="edit-field-label">DEF.</label>
    <textarea class="edit-textarea" id="editDefinition">${escapeHTML(item.definition || "")}</textarea>

    <label class="edit-field-label">SYN. 유사어, 쉼표로 구분</label>
    <input class="edit-input" id="editSynonyms" value="${escapeHTML((item.synonyms || []).join(", "))}" />

    <label class="edit-field-label">ANT. 반의어, 쉼표로 구분</label>
    <input class="edit-input" id="editAntonyms" value="${escapeHTML((item.antonyms || []).join(", "))}" />

    <div class="button-row">
      <button class="save-btn" onclick="saveEditedWord('${escapeJS(item.word)}')">저장</button>
      <button class="secondary-btn" onclick="closeModal()">취소</button>
    </div>
  `;
}

function saveEditedWord(originalWord) {
  const newWord = document.getElementById("editWord").value.trim();
  const newDefinition = document.getElementById("editDefinition").value.trim();
  const newSynonyms = splitWords(document.getElementById("editSynonyms").value);
  const newAntonyms = splitWords(document.getElementById("editAntonyms").value);

  if (!newWord || !newDefinition) {
    alert("단어와 DEF.는 비워둘 수 없어요.");
    return;
  }

  const saved = getSavedWords();
  const duplicate = saved.some((item) =>
    item.word.toLowerCase() === newWord.toLowerCase() &&
    item.word !== originalWord
  );

  if (duplicate) {
    alert("같은 단어가 이미 저장되어 있어요.");
    return;
  }

  const updated = saved.map((item) => {
    if (item.word !== originalWord) return item;

    return {
      ...item,
      word: newWord,
      definition: newDefinition,
      synonyms: newSynonyms,
      antonyms: newAntonyms
    };
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
  renderSavedWords();
  closeModal();
}

function splitWords(text) {
  return text
    .split(",")
    .map((w) => w.trim())
    .filter(Boolean);
}

function scrollToWordbook() {
  document.getElementById("wordbookCard").scrollIntoView({
    behavior: "smooth",
    block: "start"
  });
}

/* -----------------------------
   CSV DOWNLOAD
----------------------------- */
function downloadCSV() {
  const saved = getSavedWords();

  if (saved.length === 0) {
    alert("다운로드할 단어가 없어요!");
    return;
  }

  const headers = ["단어", "영영 뜻", "유사어", "반의어", "검색일자"];

  const rows = saved.map((item) => [
    item.word || "",
    item.definition || "",
    (item.synonyms || []).join(", "),
    (item.antonyms || []).join(", "),
    item.searchedDate || ""
  ]);

  const csvContent = [headers, ...rows]
    .map((row) =>
      row
        .map((cell) => `"${String(cell || "").replace(/"/g, '""')}"`)
        .join(",")
    )
    .join("\n");

  const bom = "\uFEFF";
  const blob = new Blob([bom + csvContent], {
    type: "text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = `my_wordbook_${getToday()}.csv`;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

  document.getElementById("modalBody").innerHTML = `

    <textarea
      class="word-input-area"
      id="wordListInput"
      placeholder="예: lure, dune, tune, fuse, rake, dome"

    <div class="word-input-hint">
      쉼표 또는 줄바꿈으로 구분하세요. 최소 3개, 최대 5문제가 나와요.<br>
      테스트는 한글 없이 <strong>DEF. → 영어 단어 3지선다</strong>로만 출제됩니다.
    </div>

async function startTest() {
  const raw = document.getElementById("wordListInput").value;
  const words = uniqueWords(
    raw
      .split(/[,\n]/)
      .map((w) => w.trim().toLowerCase())
      .filter(Boolean)
  );

  if (words.length < 3) {
    alert("단어를 최소 3개 이상 입력해 주세요!");
    return;
  }

  document.getElementById("modalBody").innerHTML = `
    <div class="loading-wrap" style="padding:28px 0;">
      <div class="spinner"></div>
      <div class="loading-text">문제 준비 중... ✨</div>
    </div>
  `;

  try {
    quizData = await buildQuizData(words);
    currentQ = 0;
    score = 0;
    renderQuiz();
  } catch (error) {
    document.getElementById("modalBody").innerHTML = `
      <div style="text-align:center;color:#E57373;padding:22px;font-weight:800;line-height:1.6;">
        ❌ 문제를 만들 수 없어요.<br>
        단어 철자를 확인하거나 다른 단어를 넣어주세요.
      </div>
    `;
  }
}

async function buildQuizData(words) {
  const picked = shuffle([...words]).slice(0, 5);
  const results = [];

  for (const word of picked) {
    try {
      const data = await fetchQuizWordData(word);
      if (data && data.definition) {
        results.push(data);
      }
    } catch {
      // skip failed word
    }
  }

  if (results.length < 3) {
    throw new Error("Not enough quiz words");
  }

  return results.map((item) => {
    const wrongs = shuffle(
      results
        .filter((x) => x.word !== item.word)
        .map((x) => x.word)
    ).slice(0, 2);

    return {
      word: item.word,
      definition: item.definition,
      choices: shuffle([item.word, ...wrongs])
    };
  });
}

async function fetchQuizWordData(word) {
  const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`;
  const res = await fetch(url);

  if (!res.ok) {
    throw new Error("not found");
  }

  const data = await res.json();
  const entry = data[0];
  const meanings = entry.meanings || [];
  const kidFriendly = findKidFriendlyDefinition(meanings);

  if (!kidFriendly.definition) {
    throw new Error("no definition");
  }

  return {
    word: entry.word || word,
    definition: kidFriendly.definition.definition
  };
}

function renderQuiz() {
  if (currentQ >= quizData.length) {
    showQuizResult();
    return;
  }

  const q = quizData[currentQ];
  const pct = (currentQ / quizData.length) * 100;

  document.getElementById("modalBody").innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-progress">${currentQ + 1} / ${quizData.length}</div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>

      <div class="quiz-question">
        <div class="quiz-q-label">DEF.</div>
        <div class="quiz-q-def">${escapeHTML(q.definition)}</div>
      </div>

      <div class="quiz-choices">
        ${q.choices.map((choice) => `
          <button
            class="quiz-choice"
            onclick="answerQuiz('${escapeJS(choice)}', '${escapeJS(q.word)}', this)"
          >
            ${escapeHTML(choice)}
          </button>
        `).join("")}
      </div>
    </div>
  `;
}

function answerQuiz(choice, correct, btn) {
  const isCorrect = choice.toLowerCase() === correct.toLowerCase();
  const allBtns = document.querySelectorAll(".quiz-choice");

  allBtns.forEach((b) => {
    b.classList.add("disabled");

    if (b.textContent.trim().toLowerCase() === correct.toLowerCase()) {
      b.classList.add("correct");
    }
  });

  if (!isCorrect) {
    btn.classList.add("wrong");
  }

  if (isCorrect) {
    score++;
    launchConfetti(true);
  }

  setTimeout(() => {
    currentQ++;
    renderQuiz();
  }, 1200);
}

function showQuizResult() {
  const pct = Math.round((score / quizData.length) * 100);

  let emoji = "💪";
  let msg = "다시 도전해 보세요!";

  if (pct === 100) {
    emoji = "🏆";
    msg = "완벽해요! 최고예요!";
  } else if (pct >= 80) {
    emoji = "⭐";
    msg = "정말 잘했어요!";
  } else if (pct >= 60) {
    emoji = "😊";
    msg = "좋아요! 조금만 더 연습해요!";
  }

  document.getElementById("modalBody").innerHTML = `
    <div class="quiz-result">
      <div class="quiz-score-emoji">${emoji}</div>
      <div class="quiz-score">${score} / ${quizData.length}</div>
      <div class="quiz-score-msg">${msg}</div>

      <div class="button-row" style="justify-content:center;">
        <button class="start-test-btn" onclick="renderWordInputScreen()">다시 테스트하기 🔄</button>
      </div>
    </div>
  `;

  if (pct === 100) {
    launchConfetti(true);
  }
}

/* -----------------------------
   CONFETTI
----------------------------- */
function launchConfetti(big = false) {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = [
    "#2979FF",
    "#00B0FF",
    "#40C4FF",
    "#448AFF",
    "#82B1FF",
    "#FFD740",
    "#FF9800",
    "#E040FB"
  ];

  const count = big ? 170 : 70;

  const pieces = Array.from({ length: count }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: Math.random() * 12 + 5,
    h: Math.random() * 7 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360,
    vx: (Math.random() - 0.5) * 5,
    vy: Math.random() * 4 + 3,
    vr: (Math.random() - 0.5) * 10
  }));

  let frame = 0;
  const maxFrames = big ? 145 : 80;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach((p) => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rot * Math.PI) / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();

      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
    });

    frame++;

    if (frame < maxFrames) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  draw();
}

/* -----------------------------
   UTILS
----------------------------- */
function getToday() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function uniqueWords(arr) {
  return [...new Set(arr.filter(Boolean).map((w) => String(w).trim()).filter(Boolean))];
}

function shuffle(arr) {
  return arr
    .map((v) => ({ value: v, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map((obj) => obj.value);
}

function escapeHTML(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeJS(value) {
  return String(value ?? "")
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'")
    .replaceAll('"', '\\"');
}
</script>
